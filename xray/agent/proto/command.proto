syntax = "proto3";

package xray.app.proxyman.command;
option go_package = "github.com/xtls/xray-core/app/proxyman/command";

import "typed_message.proto";
import "user.proto";

// Добавление пользователя в работающий inbound (без рестарта).
message AddUserOperation {
  xray.common.protocol.User user = 1;
}

// Удаление пользователя из inbound по email.
message RemoveUserOperation {
  string email = 1;
}

message AlterInboundRequest {
  string tag = 1;
  // operation — TypedMessage с AddUserOperation/RemoveUserOperation.
  xray.common.serial.TypedMessage operation = 2;
}

message AlterInboundResponse {}

service HandlerService {
  rpc AlterInbound(AlterInboundRequest) returns (AlterInboundResponse) {}
}
