# Прод-стек control-plane (backend + админка + БД + Redis + Caddy для TLS).
# Запуск: docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env up -d --build
#
# Перед запуском:
#   - заполнить server/.env (ключи YooKassa/Telegram/JWT и т.д.)
#   - заполнить deploy/.env (домены, пароль БД)
#   - прописать домены в deploy/Caddyfile

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vpn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vpn}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vpn}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file:
      - ../server/.env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
    expose:
      - "3000"

  admin:
    build:
      context: ../admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${ADMIN_API_BASE_URL:?set ADMIN_API_BASE_URL}
    restart: unless-stopped
    depends_on:
      - server
    expose:
      - "80"

  # VPN-узел (Xray + агент) на том же VPS. Backend обращается к нему по имени
  # сервиса: в админке URL агента = http://xray-node:8090 (одна docker-сеть).
  xray-node:
    build:
      context: ../xray
      dockerfile: agent/Dockerfile
    restart: unless-stopped
    depends_on:
      - caddy
    environment:
      AGENT_SECRET: ${AGENT_SECRET:?set AGENT_SECRET}
      INBOUND_TAG: vless-in
      # Прямой режим (Reality). Без ключа reality-инбаунд не поднимается.
      REALITY_PRIVATE_KEY: ${REALITY_PRIVATE_KEY:-}
    volumes:
      - ../xray/cert:/etc/xray/cert:ro
      - ../xray/data:/data
    expose:
      - "8090"
    ports:
      # origin для NGENIX (TLS). Закрыть фаерволом для подсетей NGENIX.
      - "8443:8443"
      # Прямой режим (VLESS+Vision+Reality) на 443: маскируется под обычный HTTPS.
      # Не-VPN трафик (api/admin, вебхуки) reality проксирует в Caddy (dest=caddy:443).
      - "443:443"

  # Прямой режим через Hysteria2 (UDP/QUIC) на 443/udp — рядом с reality (443/tcp),
  # выглядит как HTTP/3. Для лоссовых международных путей, где TCP-reality рвётся.
  # auth — через агент xray-node (тот же UUID = одно устройство).
  hysteria:
    image: tobyxdd/hysteria
    restart: unless-stopped
    command: ["server", "-c", "/etc/hysteria/config.yaml"]
    depends_on:
      - xray-node
      - caddy
    volumes:
      - ../hysteria:/etc/hysteria
      # LE-серт api.lytinef.ru от Caddy (read-only) — hysteria использует его как TLS.
      - ./data/caddy:/caddy-data:ro
    ports:
      - "443:443/udp"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - server
      - admin
    ports:
      # 443 на хосте занимает xray (reality); сюда reality проксирует не-VPN трафик
      # по docker-сети (caddy:443). 80 оставляем для ACME http-01 (выпуск/продление).
      - "80:80"
    expose:
      - "443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data
      - ./data/caddy-config:/config
