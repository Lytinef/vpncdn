# Прод-стек control-plane (backend + админка + БД + Redis + Caddy для TLS).
# Запуск: docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env up -d --build
#
# Перед запуском:
#   - заполнить server/.env (ключи YooKassa/Telegram/JWT и т.д.)
#   - заполнить deploy/.env (домены, пароль БД)
#   - прописать домены в deploy/Caddyfile

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vpn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vpn}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vpn}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file:
      - ../server/.env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
    expose:
      - "3000"

  admin:
    build:
      context: ../admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${ADMIN_API_BASE_URL:?set ADMIN_API_BASE_URL}
    restart: unless-stopped
    depends_on:
      - server
    expose:
      - "80"

  # VPN-узел (Xray + агент) на том же VPS. Backend обращается к нему по имени
  # сервиса: в админке URL агента = http://xray-node:8090 (одна docker-сеть).
  xray-node:
    build:
      context: ../xray
      dockerfile: agent/Dockerfile
    restart: unless-stopped
    depends_on:
      - caddy
    environment:
      AGENT_SECRET: ${AGENT_SECRET:?set AGENT_SECRET}
      INBOUND_TAG: vless-in
    volumes:
      - ../xray/cert:/etc/xray/cert:ro
      - ../xray/data:/data
    expose:
      - "8090"
    ports:
      # origin для NGENIX (TLS). Закрыть фаерволом для подсетей NGENIX.
      - "8443:8443"
      # 443/tcp вернули Caddy (reality-фронтинг ломал api.lytinef.ru в браузерах).
      # Прямой режим теперь Hysteria2 на 443/udp (см. сервис hysteria).

  # Прямой режим — AmneziaWG (WireGuard + обфускация против DPI) на 51820/udp.
  # Провижининг пиров — мини-API на :8091 (backend, по AGENT_SECRET).
  # (Hysteria2 удалён: awg оказался быстрее и стабильнее на пути; 443/udp вернули Caddy.)
  awg:
    build:
      context: ../awg
      dockerfile: Dockerfile
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"
    environment:
      AGENT_SECRET: ${AGENT_SECRET:?set AGENT_SECRET}
      # Необязательна на уровне compose (иначе build/genkey не запустить, пока
      # ключ не сгенерён). entrypoint валидирует при старте контейнера.
      AWG_PRIVATE_KEY: ${AWG_PRIVATE_KEY:-}
    volumes:
      - ../awg/data:/data
    expose:
      - "8091"
    ports:
      - "51820:51820/udp"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - server
      - admin
    ports:
      - "80:80"
      # api/admin напрямую (reality/hysteria убраны с 443). 443/udp вернули Caddy —
      # HTTP/3 снова работает (чинит NetworkError в браузере из-за кэша Alt-Svc h3).
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data
      - ./data/caddy-config:/config
